<body class="bg-hardware-gray text-hardware-black antialiased">

  <!-- Using React 17 UMD builds to avoid React 18 createRoot issues -->
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>

  <!-- Babel standalone for JSX transpilation -->

  <!-- Main application script -->
  <script type="text/babel" data-presets="react">
    const { useEffect, useState, createContext, useContext, useMemo } = React;
    const { BrowserRouter, Routes, Route, Link, useNavigate, useLocation } = ReactRouterDOM;
    const { motion } = window.framerMotion || { motion: { div: 'div', button: 'button' } };

    // ========================
    // Cart Context
    // ========================
    const CartContext = createContext();

    const CartProvider = ({ children }) => {
      const [items, setItems] = useState([]);
      const [isCartOpen, setIsCartOpen] = useState(false);

      const addToCart = (product) => {
        setItems(prev => {
          const existing = prev.find(item => item.id === product.id);
          if (existing) {
            return prev.map(item =>
              item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
            );
          }
          return [...prev, { ...product, quantity: 1 }];
        });
        setIsCartOpen(true);
      };

      const updateQuantity = (id, quantity) => {
        if (quantity <= 0) {
          removeFromCart(id);
          return;
        }
        setItems(prev => prev.map(item => item.id === id ? { ...item, quantity } : item));
      };

      const removeFromCart = (id) => {
        setItems(prev => prev.filter(item => item.id !== id));
      };

      const clearCart = () => setItems([]);

      const cartTotal = useMemo(() => {
        return items.reduce((sum, item) => sum + item.price * item.quantity, 0);
      }, [items]);

      const openCart = () => setIsCartOpen(true);
      const closeCart = () => setIsCartOpen(false);

      return (
        <CartContext.Provider value={{
          items, addToCart, updateQuantity, removeFromCart, clearCart,
          cartTotal, isCartOpen, openCart, closeCart, itemsCount: items.reduce((count, item) => count + item.quantity, 0)
        }}>
          {children}
        </CartContext.Provider>
      );
    };

    const useCart = () => useContext(CartContext);

    // ========================
    // ScrollToTop Component
    // ========================
    const ScrollToTop = () => {
      const { pathname } = useLocation();
      useEffect(() => { window.scrollTo(0, 0); }, [pathname]);
      return null;
    };

    // ========================
    // Navbar Component
    // ========================

      const [mobileOpen, setMobileOpen] = useState(false);
      const location = useLocation();

              <div className="hidden md:flex items-center gap-8">

            <h4 className="font-display font-bold text-white text-lg mb-4 uppercase">Contact</h4>

              <li className="flex items-center gap-2"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg> 652 557 791</li>

      </footer>

    // ========================
    // Cart Drawer Component
    // ========================
    const CartDrawer = () => {

            <div className="flex-1 overflow-y-auto p-6 space-y-4">
              {items.length === 0 ? (

                          </button>
                          <span className="w-8 text-center text-sm">{item.quantity}</span>
                          <button onClick={() => updateQuantity(item.id, item.quantity + 1)} className="p-1 hover:bg-gray-100">

                          </button>
                        </div>
                        <button onClick={() => removeFromCart(item.id)} className="text-red-500 p-1">

                        </button>
                      </div>
                    </div>
                    <div className="font-bold text-sm text-hardware-orange">
                      {(item.price * item.quantity).toLocaleString('fr-FR')} FCFA
                    </div>
                  </div>
                ))
              )}
            </div>

            {items.length > 0 && (
              <div className="p-6 border-t">
                <div className="flex justify-between mb-4">
                  <span className="font-bold uppercase">Total</span>
                  <span className="font-display font-bold text-xl">{cartTotal.toLocaleString('fr-FR')} FCFA</span>
                </div>
                <button
                  onClick={() => { closeCart(); navigate('/panier'); }}
                  className="w-full bg-hardware-orange hover:bg-hardware-orange-hover text-white font-bold uppercase py-3 tracking-wider transition-colors"
                >
                  Voir le panier
                </button>
              </div>
            )}
          </div>
        </>
      );
    };

    // ========================
    // Home Page
    // ========================
    const Home = () => {
      const navigate = useNavigate();
      return (
        <div className="bg-hardware-gray">
          <section className="bg-hardware-black text-white py-20 md:py-28">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="max-w-3xl">
                <h1 className="text-4xl md:text-6xl font-display font-bold uppercase tracking-tight mb-6">
                  Votre <span className="text-hardware-orange">quincaillerie</span> de référence à Yaoundé

                <p className="text-lg text-gray-300 mb-8 leading-relaxed">
                  Outillage professionnel, matériaux de construction, visserie, services de découpe et reproduction de clés. Tout ce qu'il vous faut pour vos projets.
                </p>
                <div className="flex flex-wrap gap-4">
                  <button
                    onClick={() => navigate('/boutique')}
                    className="bg-hardware-orange hover:bg-hardware-orange-hover text-white font-bold uppercase px-8 py-4 tracking-widest transition-colors"
                  >
                    Voir le catalogue
                  </button>
                  <button
                    onClick={() => navigate('/contact')}
                    className="border-2 border-hardware-orange text-hardware-orange hover:bg-hardware-orange hover:text-white font-bold uppercase px-8 py-4 tracking-widest transition-colors"
                  >
                    Nous contacter
                  </button>

          <section className="bg-hardware-slate text-white py-12">
            <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
              <div className="flex items-center gap-4">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-hardware-orange"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>

                <div>

    // ========================
    // Store Page (adapted from provided code)
    // ========================

      { id: 1, name: "Perceuse visseuse 18V XR", category: "Électroportatif", brand: "DeWalt", ref: "DCD791D2-QW", price: 125000, image: "https://images.unsplash.com/photo-1504148455328-c376907d081c?auto=format&fit=crop&q=80&w=400&h=300", isNew: true },

      { id: 5, name: "Caisse à outils PRO 65 pièces", category: "Outillage à main", brand: "Stanley", ref: "STMT71651", price: 85000, image: "https://images.unsplash.com/photo-1586864387967-d02ef85d93e8?auto=format&fit=crop&q=80&w=400&h=300", isNew: false },
      { id: 6, name: "Mastic silicone sanitaire transparent", category: "Matériaux", brand: "Rubson", ref: "SIL-SAN-T", price: 4500, image: "https://images.unsplash.com/photo-1585659722983-38ca84b518d6?auto=format&fit=crop&q=80&w=400&h=300", isNew: false },
    ];

    const CATEGORIES = ["Tous", "Électroportatif", "Outillage à main", "Visserie", "Mesure", "Matériaux"];

    const Store = () => {
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedCategory, setSelectedCategory] = useState('Tous');
      const { addToCart } = useCart();

      const filtered = MOCK_PRODUCTS.filter(p => {
        const s = searchTerm.toLowerCase();
        return (p.name.toLowerCase().includes(s) || p.ref.toLowerCase().includes(s)) &&
          (selectedCategory === 'Tous' || p.category === selectedCategory);
      });

      return (
        <div className="bg-hardware-gray min-h-screen py-12">
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div className="mb-12">
